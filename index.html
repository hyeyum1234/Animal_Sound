<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동물 소리 맞추기 게임</title>
    <style>
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0fdf4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            background: white;
            width: 95vw;
            height: 95vh;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh;
            box-sizing: border-box;
            position: relative;
        }

        h1 { color: #16a34a; margin: 1vh 0; font-size: 2.5rem; text-align: center; }
        .score { font-size: 1.2rem; color: #64748b; text-align: center; }

        #play-btn-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #play-btn {
            background-color: #ffcf33;
            border: none;
            border-radius: 50%;
            width: 25vh;
            height: 25vh;
            font-size: 12vh;
            cursor: pointer;
            box-shadow: 0 10px 0 #e6b800;
            transition: all 0.1s;
        }

        #play-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #e6b800;
        }

        #instruction {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            margin: 1vh 0;
            text-align: center;
            height: 2.2rem;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            height: 35vh;
        }

        .option-btn {
            background: #f8fafc;
            border: 5px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15vh;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .option-btn:hover { background: #f0f9ff; border-color: #3b82f6; }
        .option-btn:active { transform: scale(0.95); }

        #feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 40px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 40vh;
            font-weight: bold;
            z-index: 10;
        }

        .correct { background-color: rgba(74, 222, 128, 0.9); color: white; }
        .incorrect { background-color: rgba(248, 113, 113, 0.9); color: white; }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="feedback-overlay"></div>

        <h1>누구 소리일까?</h1>
        <div class="score">맞춘 개수: <span id="score-count">0</span></div>
        
        <div id="play-btn-container">
            <button id="play-btn" onclick="playAnimalSound()">📢</button>
        </div>
        
        <p id="instruction">눌러서 들어보자!</p>

        <div id="options"></div>
    </div>

    <audio id="animal-audio"></audio>

    <script>
        const animalData = [
            { name: "강아지", icon: "🐶", sound: "scottishperson-sound-effect-dog-crying-05-367321.mp3" },
            { name: "고양이", icon: "🐱", sound: "dragon-studio-cat-meow-401729.mp3" },
            { name: "개구리", icon: "🐸", sound: "dragon-studio-frog-croaking-sound-effect-322956.mp3" },
            { name: "귀뚜라미", icon: "🦗", sound: "emircanalp-crcr-bocegi-125035.mp3" },
            { name: "새", icon: "🐦", sound: "freesound_community-birds-19624.mp3" },
            { name: "사자", icon: "🦁", sound: "lion.mp3" },
            { name: "코끼리", icon: "🐘", sound: "dragon-studio-elephant-trumpeting-494313.mp3" },
            { name: "티라노사우르스", icon: "🦖", sound: "gsmsea-dinosaur-roar-or-scream-9-431295.mp3" },
            { name: "말", icon: "🐴", sound: "dragon-studio-gentle-horse-whinny-499650.mp3" },
            { name: "원숭이", icon: "🐒", sound: "u_zpj3vbdres-monkey-128368.mp3" },
            { name: "꿀벌", icon: "🐝", sound: "delon_boomkin-bee-landing-on-flower-374609.mp3" },
            // 새로운 동물 추가 리스트
            { name: "늑대", icon: "🐺", sound: "pwlpl-realistic-wolf-howling-sound-effect-echoing-wild-call-sfx-444193.mp3" },
            { name: "돼지", icon: "🐷", sound: "pig.mp3" },
            { name: "오리", icon: "🦆", sound: "freesound_community-duck-quacking-37392.mp3" },
            { name: "소", icon: "🐮", sound: "dragon-studio-cow-moo-1-472361.mp3" },
            { name: "닭", icon: "🐔", sound: "stefan_grace-rooster-233738.mp3" },
            { name: "뱀", icon: "🐍", sound: "mightuser-1-snake_hissing-sound-natural-sfx-253792.mp3" }
        ];

        let questionQueue = [];
        let currentAnswer = null;
        let score = 0;
        let isProcessing = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            isProcessing = false;
            const overlay = document.getElementById('feedback-overlay');
            overlay.style.display = "none";
            overlay.className = "";

            document.getElementById('options').innerHTML = "";
            document.getElementById('instruction').innerText = "눌러서 들어보자!";
            
            if (questionQueue.length === 0) {
                questionQueue = shuffle([...animalData]);
            }

            currentAnswer = questionQueue.shift();
            
            let choices = [currentAnswer];
            while (choices.length < 3) {
                let randomAnimal = animalData[Math.floor(Math.random() * animalData.length)];
                if (!choices.some(c => c.name === randomAnimal.name)) {
                    choices.push(randomAnimal);
                }
            }
            
            shuffle(choices);

            choices.forEach(animal => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = animal.icon;
                btn.onclick = () => checkAnswer(animal);
                document.getElementById('options').appendChild(btn);
            });

            document.getElementById('animal-audio').src = currentAnswer.sound;
        }

        function playAnimalSound() {
            if (isProcessing) return;
            const audio = document.getElementById('animal-audio');
            audio.play().catch(e => {
                console.error(currentAnswer.name + " 파일 없음");
            });
            document.getElementById('instruction').innerText = "잘 들어봐! 👂";
        }

        function checkAnswer(selected) {
            if (isProcessing) return;
            isProcessing = true;

            const overlay = document.getElementById('feedback-overlay');
            overlay.style.display = "flex";

            if (selected.name === currentAnswer.name) {
                overlay.innerText = "O";
                overlay.className = "correct";
                score++;
                document.getElementById('score-count').innerText = score;
                setTimeout(initGame, 1200);
            } else {
                overlay.innerText = "X";
                overlay.className = "incorrect";
                setTimeout(() => {
                    overlay.style.display = "none";
                    overlay.className = "";
                    isProcessing = false;
                    document.getElementById('instruction').innerText = "다시 들어볼까? 😮";
                }, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>
